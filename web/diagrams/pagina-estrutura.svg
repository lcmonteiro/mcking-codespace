<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <style>
      .title { font: bold 22px 'Segoe UI', Arial, sans-serif; fill: #333; text-anchor: middle; }
      .head { font: bold 16px 'Segoe UI', Arial, sans-serif; fill: #333; text-anchor: middle; }
      .text { font: 12px 'Segoe UI', Arial, sans-serif; fill: #555; }
      .small { font: 11px 'Segoe UI', Arial, sans-serif; fill: #666; text-anchor: middle; }
    </style>
  </defs>
  <rect width="800" height="500" fill="#f5f5f5" rx="8"/>
  <text x="400" y="45" class="title">Mcking Codespace</text>
  <text x="400" y="75" class="head">Estrutura do repositório</text>
  
  <!-- cpp -->
  <rect x="50" y="110" width="200" height="70" rx="4" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="150" y="140" font="bold 13px Segoe UI" fill="#333" text-anchor="middle">cpp/  🖥️</text>
  <text x="150" y="158" class="small">C++23 — gpt.cpp, etc.</text>
  
  <!-- python -->
  <rect x="300" y="110" width="200" height="70" rx="4" fill="#d5e8d4" stroke="#82b366"/>
  <text x="400" y="140" font="bold 13px Segoe UI" fill="#333" text-anchor="middle">python/  🐍</text>
  <text x="400" y="158" class="small">Scripts utilitários</text>
  
  <!-- web -->
  <rect x="550" y="110" width="200" height="70" rx="4" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="650" y="140" font="bold 13px Segoe UI" fill="#333" text-anchor="middle">web/  🌐</text>
  <text x="650" y="158" class="small">HTML/JS/CSS, diagramas</text>
  
  <!-- scripts -->
  <rect x="50" y="220" width="200" height="70" rx="4" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="150" y="250" font="bold 13px Segoe UI" fill="#333" text-anchor="middle">scripts/  ⚙️</text>
  <text x="150" y="268" class="small">build.ps1, sync-github.js</text>
  
  <!-- docs -->
  <rect x="300" y="220" width="450" height="70" rx="4" fill="#fff2cc" stroke="#d6b656"/>
  <text x="525" y="250" font="bold 13px Segoe UI" fill="#333" text-anchor="middle">README.md + .gitignore</text>
  <text x="525" y="268" class="small">Documentação e configuração git</text>
  
  <!-- build flow -->
  <line x1="150" y1="180" x2="150" y2="220" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="140" y="205" class="small" text-anchor="end">compila</text>
  
  <!-- deploy key -->
  <rect x="50" y="330" width="300" height="40" rx="8" fill="#f8cecc" stroke="#b85450" stroke-dasharray="5,3"/>
  <text x="200" y="355" class="small">🔑 Build output (gitignored)</text>
  
  <!-- github -->
  <rect x="400" y="330" width="350" height="40" rx="8" fill="#fff2cc" stroke="#333"/>
  <text x="575" y="355" class="small">☁️ github.com/lcmonteiro/mcking-codespace</text>
  
  <line x1="525" y1="330" x2="525" y2="300" stroke="#333" stroke-width="1.5"/>
  <line x1="525" y1="300" x2="575" y2="300" stroke="#333" stroke-width="1.5"/>
  <line x1="575" y1="300" x2="575" y2="330" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="545" y="296" class="small">git push</text>
  
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
  </marker>
  <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
  </marker>
</svg>
