<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <style>
      .title { font: bold 22px 'Segoe UI', Arial, sans-serif; fill: #333; text-anchor: middle; }
      .head { font: bold 16px 'Segoe UI', Arial, sans-serif; fill: #333; text-anchor: middle; }
      .text { font: 12px 'Segoe UI', Arial, sans-serif; fill: #555; }
    </style>
  </defs>
  <rect width="800" height="500" fill="#f5f5f5" rx="8"/>
  <text x="400" y="45" class="title">Processo: Python</text>
  <text x="400" y="75" class="head">Correr Python scripts</text>
  
  <!-- Step 1 -->
  <rect x="250" y="110" width="300" height="45" rx="6" fill="#d5e8d4" stroke="#82b366"/>
  <text x="400" y="138" class="head" text-anchor="middle">1. python script.py</text>
  <polygon points="400,155 390,170 410,170" fill="#82b366"/>
  
  <!-- Step 2 -->
  <rect x="100" y="170" width="250" height="45" rx="6" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="225" y="198" class="text" text-anchor="middle">Python 3 (sistema)</text>
  <polygon points="225,215 215,230 235,230" fill="#9673a6"/>
  <rect x="450" y="170" width="250" height="45" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="575" y="198" class="text" text-anchor="middle">Pip + venv (opcional)</text>
  
  <!-- Step 3 -->
  <polygon points="400,215 390,230 410,230" fill="#82b366"/>
  <rect x="250" y="230" width="300" height="45" rx="6" fill="#d5e8d4" stroke="#82b366"/>
  <text x="400" y="258" class="text" text-anchor="middle">✅ Output</text>
  
  <text x="400" y="340" class="head">Exemplo:</text>
  <text x="400" y="365" class="text">python python/meu_script.py</text>
  <text x="400" y="390" class="text"># ou com python3</text>
  <text x="400" y="415" class="text">python3 python/meu_script.py</text>
</svg>
