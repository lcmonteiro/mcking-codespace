<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodecShare Chat</title>
  <link rel="stylesheet" href="style.css" />
  <!-- PeerJS for WebRTC signaling -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js" defer></script>
  <!-- Codec WASM module (generated by build.sh) -->
  <script src="codec_share.js" defer></script>
  <!-- App modules -->
  <script src="utils.js" defer></script>
  <script src="codec.js" defer></script>
  <script src="webrtc.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <!-- ─── Join / Create Room ─── -->
  <div id="screen-join" class="screen active">
    <div class="card">
      <h1>🔐 CodecShare Chat</h1>
      <p class="subtitle">Peer‑to‑peer chat with fountain‑code encryption</p>

      <label for="room-token">Room Token</label>
      <div class="token-row">
        <input type="text" id="room-token" placeholder="e.g. my-secret-room" autofocus />
        <button id="btn-generate" class="secondary" title="Generate random token">🎲</button>
      </div>

      <div class="name-row">
        <label for="nickname">Nickname</label>
        <input type="text" id="nickname" placeholder="Anonymous" maxlength="24" />
      </div>

      <button id="btn-join" class="primary">🚀 Join Room</button>

      <p class="hint">
        Your browser will connect directly to other peers in the same room.
        No messages pass through any server.
      </p>
    </div>
  </div>

  <!-- ─── Chat Room ─── -->
  <div id="screen-chat" class="screen">
    <header>
      <div class="header-left">
        <strong>Room:</strong> <code id="room-display"></code>
        <span class="badge" id="peer-count">0 peers</span>
      </div>
      <div class="header-right">
        <span id="user-nick-display"></span>
        <button id="btn-leave" class="secondary small">✕ Leave</button>
      </div>
    </header>

    <div id="status-bar">
      <span id="status-text">Connecting…</span>
      <span id="codec-status"></span>
    </div>

    <!-- Messages -->
    <div id="messages" role="log" aria-live="polite">
      <div class="msg system">Join a room to start chatting.</div>
    </div>

    <!-- Input area -->
    <div id="input-area">
      <textarea id="msg-input" rows="1" placeholder="Type a message…" maxlength="4096"></textarea>
      <button id="btn-send" class="primary" disabled>Send</button>
    </div>
  </div>

  <!-- ─── Toast ─── -->
  <div id="toast-container"></div>
</body>
</html>
