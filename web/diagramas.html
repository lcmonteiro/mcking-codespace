<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mcking Codespace - Diagramas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; color: #333; padding: 20px; }
  h1 { font-size: 24px; margin-bottom: 4px; }
  p.desc { font-size: 13px; color: #777; margin-bottom: 20px; }
  
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 2px solid #ddd;
    margin-bottom: 20px;
  }
  .tab-btn {
    padding: 10px 22px;
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: #666;
    margin-right: 4px;
    transition: all 0.15s;
    position: relative;
    top: 2px;
  }
  .tab-btn:hover { background: #e8e8e8; color: #333; }
  .tab-btn.active {
    background: #fff;
    color: #1a73e8;
    border-color: #1a73e8;
    border-bottom: 2px solid #fff;
    top: 2px;
  }
  
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  
  .svg-container {
    background: #fafafa;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 10px;
    max-width: 100%;
  }
  .svg-container svg { display: block; max-width: 100%; height: auto; }
  
  .tip {
    margin-top: 16px;
    padding: 12px 16px;
    background: #fff8e1;
    border-left: 4px solid #f9a825;
    border-radius: 4px;
    font-size: 13px;
    color: #555;
  }
  .tip code { background: #eee; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
</style>
</head>
<body>

<h1>📐 Mcking Codespace</h1>
<p class="desc">Diagramas com tabs — clica para navegar</p>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab(0)">📁 Estrutura</button>
  <button class="tab-btn" onclick="switchTab(1)">⚙️ Compilar C++</button>
  <button class="tab-btn" onclick="switchTab(2)">🐍 Python</button>
</div>

<div id="tab-0" class="tab-content active">
  <div class="svg-container">
    <object data="diagrams/pagina-estrutura.svg" type="image/svg+xml">SVG não disponível</object>
  </div>
</div>

<div id="tab-1" class="tab-content">
  <div class="svg-container">
    <object data="diagrams/pagina-compilar.svg" type="image/svg+xml">SVG não disponível</object>
  </div>
</div>

<div id="tab-2" class="tab-content">
  <div class="svg-container">
    <object data="diagrams/pagina-python.svg" type="image/svg+xml">SVG não disponível</object>
  </div>
</div>

<div class="tip">
  💡 <strong>Dica:</strong> Para adicionar mais páginas, coloca um SVG em <code>diagrams/</code>, 
  adiciona um botão no <code>.tab-bar</code> e uma <code>#tab-N</code> com o SVG. 
  Simple e funcional.
</div>

<script>
const tabs = [
  document.getElementById('tab-0'),
  document.getElementById('tab-1'),
  document.getElementById('tab-2')
];
const btnContainer = document.querySelector('.tab-bar');
const btns = btnContainer.querySelectorAll('.tab-btn');

function switchTab(idx) {
  btns.forEach(b => b.classList.remove('active'));
  tabs.forEach(t => t.classList.remove('active'));
  btns[idx].classList.add('active');
  tabs[idx].classList.add('active');
}
</script>

</body>
</html>
