<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 600" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <style>
      .title { font: bold 24px 'Segoe UI', Arial, sans-serif; fill: #333; }
      .subtitle { font: 12px 'Segoe UI', Arial, sans-serif; fill: #999; }
      .box-label { font: bold 13px 'Segoe UI', Arial, sans-serif; fill: #333; }
      .box-text { font: 10px 'Segoe UI', Arial, sans-serif; fill: #555; }
      .conn-label { font: 10px 'Segoe UI', Arial, sans-serif; fill: #666; }
      .code-title { font: bold 13px 'Segoe UI', Arial, sans-serif; fill: #2a5db0; }
      .code-text { font: 10px 'Segoe UI', Arial, sans-serif; fill: #444; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrow-tri" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" class="title">Mcking Codespace</text>
  <text x="450" y="580" text-anchor="middle" class="subtitle">Gerido por Mcking 🤖</text>

  <!-- Root container -->
  <rect x="80" y="70" width="740" height="460" rx="10" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="92" font="12px 'Segoe UI'" fill="#888">mcking-codespace/</text>

  <!-- === cpp/ === -->
  <rect x="100" y="110" width="200" height="70" rx="4" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="200" y="140" text-anchor="middle" class="box-label">cpp/  C++23</text>
  <text x="200" y="158" text-anchor="middle" class="box-text">gpt.cpp, input.txt</text>

  <!-- === python/ === -->
  <rect x="330" y="110" width="200" height="70" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="430" y="140" text-anchor="middle" class="box-label">python/  🐍</text>
  <text x="430" y="158" text-anchor="middle" class="box-text">scripts utilitários</text>

  <!-- === web/ === -->
  <rect x="560" y="110" width="240" height="70" rx="4" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="680" y="140" text-anchor="middle" class="box-label">web/  🌐</text>
  <text x="680" y="158" text-anchor="middle" class="box-text">HTML/JS/CSS, diagramas</text>

  <!-- === scripts/ === -->
  <rect x="100" y="210" width="200" height="70" rx="4" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="200" y="240" text-anchor="middle" class="box-label">scripts/  ⚙️</text>
  <text x="200" y="258" text-anchor="middle" class="box-text">build.ps1, sync-github.js</text>

  <!-- === README + git === -->
  <rect x="330" y="210" width="470" height="70" rx="4" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="565" y="240" text-anchor="middle" class="box-label">README.md + .gitignore</text>
  <text x="565" y="258" text-anchor="middle" class="box-text">documentação &amp; git config</text>

  <!-- === Arrow: cpp → scripts === -->
  <line x1="200" y1="180" x2="200" y2="210" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="210" y="198" class="conn-label">compila com</text>

  <!-- === Arrow: scripts → python === -->
  <line x1="300" y1="245" x2="330" y2="245" stroke="#666" stroke-width="1"/>

  <!-- === Build output === -->
  <rect x="100" y="310" width="200" height="55" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="200" y="335" text-anchor="middle" class="box-label">Build Output</text>
  <text x="200" y="352" text-anchor="middle" class="box-text">gpt.exe, etc. (gitignored)</text>

  <!-- === GitHub === -->
  <rect x="330" y="310" width="470" height="55" rx="8" fill="#fff2cc" stroke="#aaa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="565" y="335" text-anchor="middle" class="box-label">GitHub</text>
  <text x="565" y="352" text-anchor="middle" class="box-text">github.com/lcmonteiro/mcking-codespace</text>

  <!-- Arrow: root → github -->
  <line x1="450" y1="310" x2="450" y2="290" stroke="#333" stroke-width="1.5"/>
  <line x1="450" y1="290" x2="565" y2="290" stroke="#333" stroke-width="1.5"/>
  <line x1="565" y1="290" x2="565" y2="310" stroke="#333" stroke-width="1.5" marker-end="url(#arrow-tri)"/>
  <text x="510" y="286" text-anchor="middle" class="conn-label" fill="#333">git push</text>

  <!-- === GPT flow box === -->
  <rect x="100" y="400" width="700" height="70" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="425" text-anchor="middle" class="code-title">🧠 GPT from scratch (C++23)</text>
  <text x="450" y="443" text-anchor="middle" class="box-text">Transformer + Autograd (reverse-mode) + Adam optimizer</text>
  <text x="450" y="458" text-anchor="middle" class="box-text">Treina em 32k nomes e gera novos nomes do zero</text>
</svg>
