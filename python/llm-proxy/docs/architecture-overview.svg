<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" width="800" height="720" style="font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-light" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="720" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#172033">LLM Proxy — System Architecture</text>

  <!-- ================================================================ -->
  <!-- ZONES -->
  <!-- ================================================================ -->

  <!-- Client Zone -->
  <rect x="40" y="58" width="720" height="100" rx="8" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="56" y="74" font-size="11" fill="#5b6475" font-weight="600">CLIENT ZONE</text>

  <!-- Proxy Zone -->
  <rect x="40" y="188" width="720" height="360" rx="8" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="56" y="204" font-size="11" fill="#5b6475" font-weight="600">PROXY ZONE</text>

  <!-- Provider Zone -->
  <rect x="40" y="578" width="720" height="100" rx="8" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="56" y="594" font-size="11" fill="#5b6475" font-weight="600">PROVIDER ZONE</text>

  <!-- ================================================================ -->
  <!-- CLIENTS -->
  <!-- ================================================================ -->

  <!-- OpenAI SDK -->
  <rect x="80" y="86" width="170" height="50" rx="6" fill="#bfdbfe" stroke="#64748b" stroke-width="1"/>
  <text x="165" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">OpenAI SDK</text>
  <text x="165" y="126" text-anchor="middle" font-size="11" fill="#3b82f6">(openai-python / node)</text>

  <!-- curl/HTTP -->
  <rect x="315" y="86" width="170" height="50" rx="6" fill="#bfdbfe" stroke="#64748b" stroke-width="1"/>
  <text x="400" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">curl / HTTP</text>
  <text x="400" y="126" text-anchor="middle" font-size="11" fill="#3b82f6">(REST clients)</text>

  <!-- LangChain -->
  <rect x="550" y="86" width="170" height="50" rx="6" fill="#bfdbfe" stroke="#64748b" stroke-width="1"/>
  <text x="635" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">LangChain</text>
  <text x="635" y="126" text-anchor="middle" font-size="11" fill="#3b82f6">(ChatOpenAI base_url)</text>

  <!-- Arrows: Clients → Proxy -->
  <line x1="165" y1="136" x2="165" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="136" x2="400" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="635" y1="136" x2="635" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ================================================================ -->
  <!-- PROXY — FastAPI App -->
  <!-- ================================================================ -->

  <!-- Main FastAPI box -->
  <rect x="80" y="210" width="640" height="320" rx="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
  <text x="400" y="234" text-anchor="middle" font-size="15" font-weight="700" fill="#172033">🟦 FastAPI Application</text>

  <!-- Ingress / API endpoint label -->
  <text x="400" y="254" text-anchor="middle" font-size="11" fill="#5b6475">POST /v1/chat/completions  |  GET /v1/models  |  POST /v1/embeddings  |  /admin/*</text>

  <!-- Guards box -->
  <rect x="110" y="275" width="180" height="60" rx="6" fill="#c7d2fe" stroke="#64748b" stroke-width="1"/>
  <text x="200" y="298" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">Guards</text>
  <text x="200" y="314" text-anchor="middle" font-size="11" fill="#5b6475">extract_bearer_token</text>
  <text x="200" y="328" text-anchor="middle" font-size="11" fill="#5b6475">require_admin</text>

  <!-- Routes box -->
  <rect x="110" y="350" width="180" height="60" rx="6" fill="#c7d2fe" stroke="#64748b" stroke-width="1"/>
  <text x="200" y="373" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">Routes</text>
  <text x="200" y="389" text-anchor="middle" font-size="11" fill="#5b6475">inference.py · admin.py</text>

  <!-- Pipeline box -->
  <rect x="370" y="275" width="320" height="230" rx="6" fill="#ddd6fe" stroke="#64748b" stroke-width="1"/>
  <text x="530" y="296" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">ProxyRunnable (Pipeline)</text>

  <!-- BudgetAuth -->
  <rect x="400" y="312" width="260" height="32" rx="4" fill="#8b5cf6" stroke="#64748b" stroke-width="1"/>
  <text x="530" y="332" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">① BudgetAuthRunnable — auth + budget check</text>

  <!-- ModelResolve -->
  <rect x="400" y="350" width="260" height="32" rx="4" fill="#8b5cf6" stroke="#64748b" stroke-width="1"/>
  <text x="530" y="370" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">② ModelResolveRunnable — resolve abstraction</text>

  <!-- LLM Call -->
  <rect x="400" y="388" width="260" height="32" rx="4" fill="#8b5cf6" stroke="#64748b" stroke-width="1"/>
  <text x="530" y="408" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">③ Model.ainvoke / astream — LLM call</text>

  <!-- BudgetDeduct -->
  <rect x="400" y="426" width="260" height="32" rx="4" fill="#8b5cf6" stroke="#64748b" stroke-width="1"/>
  <text x="530" y="446" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">④ BudgetDeductRunnable — deduct + audit log</text>

  <!-- Pipeline arrows -->
  <line x1="530" y1="344" x2="530" y2="348" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="382" x2="530" y2="386" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="420" x2="530" y2="424" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DB box -->
  <rect x="110" y="430" width="180" height="60" rx="6" fill="#99f6e4" stroke="#0f766e" stroke-width="1"/>
  <text x="200" y="452" text-anchor="middle" font-size="13" font-weight="600" fill="#0f766e">Database (SQLite)</text>
  <text x="200" y="468" text-anchor="middle" font-size="11" fill="#0f766e">access_tokens</text>
  <text x="200" y="482" text-anchor="middle" font-size="11" fill="#0f766e">usage_logs · model_mappings</text>

  <!-- Arrows: Guards → Routes → Pipeline / DB -->
  <line x1="290" y1="305" x2="368" y2="328" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="290" y1="380" x2="368" y2="328" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="290" y1="460" x2="368" y2="440" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="330" y="452" font-size="10" fill="#5b6475">reads</text>

  <!-- Arrows: Routes → Pipeline -->
  <line x1="290" y1="380" x2="368" y2="380" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ================================================================ -->
  <!-- PROVIDERS -->
  <!-- ================================================================ -->

  <!-- Arrow: Proxy → Providers -->
  <line x1="400" y1="530" x2="400" y2="596" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OpenAI -->
  <rect x="140" y="606" width="200" height="50" rx="6" fill="#fde68a" stroke="#92400e" stroke-width="1"/>
  <text x="240" y="630" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">OpenAI API</text>
  <text x="240" y="646" text-anchor="middle" font-size="11" fill="#92400e">gpt-4o · o1-mini · embeddings</text>

  <!-- Anthropic -->
  <rect x="460" y="606" width="200" height="50" rx="6" fill="#fde68a" stroke="#92400e" stroke-width="1"/>
  <text x="560" y="630" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Anthropic API</text>
  <text x="560" y="646" text-anchor="middle" font-size="11" fill="#92400e">claude-3-5-sonnet · haiku</text>

  <!-- Legend -->
  <rect x="40" y="682" width="720" height="28" rx="4" fill="#f1f5f9"/>
  <rect x="56" y="688" width="14" height="14" rx="2" fill="#bfdbfe"/>
  <text x="76" y="700" font-size="11" fill="#5b6475">Client</text>
  <rect x="156" y="688" width="14" height="14" rx="2" fill="#c7d2fe"/>
  <text x="176" y="700" font-size="11" fill="#5b6475">Proxy</text>
  <rect x="256" y="688" width="14" height="14" rx="2" fill="#8b5cf6"/>
  <text x="276" y="700" font-size="11" fill="#5b6475">Pipeline Runnable</text>
  <rect x="416" y="688" width="14" height="14" rx="2" fill="#99f6e4"/>
  <text x="436" y="700" font-size="11" fill="#5b6475">Database</text>
  <rect x="536" y="688" width="14" height="14" rx="2" fill="#fde68a"/>
  <text x="556" y="700" font-size="11" fill="#5b6475">External Provider</text>
</svg>
